name: ${COMPOSE_PROJECT_NAME:-storage-main}

services:
  mysql:
    image: mysql:8.0
    container_name: ${STORAGE_MYSQL_CONTAINER:-storage-main-mysql}
    restart: unless-stopped
    ports:
      - "${STORAGE_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DB:-storage}
      MYSQL_USER: ${MYSQL_USER:-storage}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-storage123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: ${STORAGE_MINIO_CONTAINER:-storage-main-minio}
    restart: unless-stopped
    ports:
      - "${STORAGE_MINIO_PORT:-9000}:9000"
      - "${STORAGE_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  mysql_data:
    name: ${STORAGE_MYSQL_VOLUME:-storage-main_mysql_data}
  minio_data:
    name: ${STORAGE_MINIO_VOLUME:-storage-main_minio_data}
