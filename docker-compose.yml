name: storage

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: storage-backend
    hostname: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_PORT: 8080
      RESET_ADMIN_PASSWORD_ON_STARTUP: ${RESET_ADMIN_PASSWORD_ON_STARTUP:-false}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: storage-frontend
    hostname: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
