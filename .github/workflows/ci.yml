name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run backend tests
        working-directory: backend
        run: mvn test -Dspring.profiles.active=test

  flyway-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: storage
          MYSQL_USER: storage
          MYSQL_PASSWORD: storage123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u storage -pstorage123"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Flyway migrate dev path and validate
        working-directory: backend
        run: |
          mvn -q flyway:migrate flyway:validate \
            -Dflyway.url="jdbc:mysql://localhost:3306/storage?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC" \
            -Dflyway.user=storage \
            -Dflyway.password=storage123 \
            -DloadDemoData=true
      - name: Verify dev path keeps demo business data
        run: |
          docker run --rm --network host mysql:8.0 \
            mysql -h 127.0.0.1 -ustorage -pstorage123 storage -e "
              SELECT 'sys_user' AS table_name, COUNT(*) AS row_count FROM sys_user;
              SELECT 'sys_menu' AS table_name, COUNT(*) AS row_count FROM sys_menu;
              SELECT 'material_ledger' AS table_name, COUNT(*) AS row_count FROM material_ledger;
              SELECT 'design_guide' AS table_name, COUNT(*) AS row_count FROM design_guide;
              SELECT 'experience_type' AS table_name, COUNT(*) AS row_count FROM experience_type;
            " | tee /tmp/flyway-dev-counts.txt
          grep -q 'material_ledger.*15' /tmp/flyway-dev-counts.txt
          grep -q 'design_guide.*9' /tmp/flyway-dev-counts.txt
          grep -q 'experience_type.*3' /tmp/flyway-dev-counts.txt
      - name: Prepare prod-like database
        run: |
          docker run --rm --network host mysql:8.0 \
            mysql -h 127.0.0.1 -uroot -proot123 -e "
              DROP DATABASE IF EXISTS storage_prod;
              CREATE DATABASE storage_prod CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              GRANT ALL PRIVILEGES ON storage_prod.* TO 'storage'@'%';
              FLUSH PRIVILEGES;
            "
      - name: Flyway migrate prod path
        working-directory: backend
        run: |
          mvn -q flyway:migrate flyway:validate \
            -Dflyway.url="jdbc:mysql://localhost:3306/storage_prod?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC" \
            -Dflyway.user=storage \
            -Dflyway.password=storage123 \
            -DloadDemoData=false
      - name: Verify prod path strips demo business data but keeps bootstrap metadata
        run: |
          docker run --rm --network host mysql:8.0 \
            mysql -h 127.0.0.1 -ustorage -pstorage123 storage_prod -e "
              SELECT installed_rank, version, description, type, success
              FROM flyway_schema_history
              ORDER BY installed_rank;
              SELECT 'sys_user' AS table_name, COUNT(*) AS row_count FROM sys_user;
              SELECT 'sys_menu' AS table_name, COUNT(*) AS row_count FROM sys_menu;
              SELECT 'material_ledger' AS table_name, COUNT(*) AS row_count FROM material_ledger;
              SELECT 'warehouse_bin' AS table_name, COUNT(*) AS row_count FROM warehouse_bin;
              SELECT 'warehouse_bom' AS table_name, COUNT(*) AS row_count FROM warehouse_bom;
              SELECT 'design_guide' AS table_name, COUNT(*) AS row_count FROM design_guide;
              SELECT 'design_product_type' AS table_name, COUNT(*) AS row_count FROM design_product_type;
              SELECT 'design_stage' AS table_name, COUNT(*) AS row_count FROM design_stage;
              SELECT 'experience_type' AS table_name, COUNT(*) AS row_count FROM experience_type;
            " | tee /tmp/flyway-prod-counts.txt
          grep -q 'sys_user.*1' /tmp/flyway-prod-counts.txt
          grep -q 'material_ledger.*0' /tmp/flyway-prod-counts.txt
          grep -q 'warehouse_bin.*0' /tmp/flyway-prod-counts.txt
          grep -q 'warehouse_bom.*0' /tmp/flyway-prod-counts.txt
          grep -q 'design_guide.*0' /tmp/flyway-prod-counts.txt
          grep -q 'design_product_type.*0' /tmp/flyway-prod-counts.txt
          grep -q 'design_stage.*0' /tmp/flyway-prod-counts.txt
          grep -q 'experience_type.*0' /tmp/flyway-prod-counts.txt

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and test frontend
        working-directory: frontend
        run: |
          npm ci
          npm run test
          npm run build
