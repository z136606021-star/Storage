spring:
  main:
    allow-bean-definition-overriding: true
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-test.sql
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 5505025024
      max-request-size: 5505025024
  datasource:
    url: jdbc:h2:mem:storage_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@example.com
    password: test-password

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

storage:
  jwt:
    secret: test-only-jwt-secret-at-least-32-bytes-long
    ttl-minutes: 120
  password-reset:
    public-base-url: http://localhost:5173
    token-ttl-minutes: 30
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin123
    bucket: storage-test
  file-upload:
    max-size-bytes: 5505025024

logging:
  level:
    com.storage: warn
