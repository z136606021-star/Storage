spring:
  main:
    allow-bean-definition-overriding: true
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-test.sql
  datasource:
    url: jdbc:h2:mem:storage_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

storage:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin123
    bucket: storage-test

logging:
  level:
    com.storage: warn
