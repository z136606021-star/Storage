spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: storage-backend
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: true
    baseline-version: 1
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DB:storage}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:storage}
    password: ${MYSQL_PASSWORD:storage123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${BACKEND_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        http-only: ${SESSION_COOKIE_HTTP_ONLY:true}
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

storage:
  auth:
    default-password-suffix: "@123"
    reset-admin-password-on-startup: ${RESET_ADMIN_PASSWORD_ON_STARTUP:true}
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-jwt-secret-at-least-32-bytes}
    ttl-minutes: ${JWT_TTL_MINUTES:120}
  password-reset:
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
    token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:storage}
  file-upload:
    max-size-bytes: ${UPLOAD_MAX_SIZE_BYTES:5242880}
    allowed-content-types: ${UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}

logging:
  level:
    com.storage: debug
