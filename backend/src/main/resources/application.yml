spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: storage-backend
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: true
    baseline-version: 1
    placeholders:
      loadDemoData: false
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DB:storage}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:storage}
    password: ${MYSQL_PASSWORD:storage123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_REQUEST_SIZE_BYTES:5505025024}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE_BYTES:5505025024}

server:
  port: ${BACKEND_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        http-only: ${SESSION_COOKIE_HTTP_ONLY:true}
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

storage:
  auth:
    default-password-suffix: "@123"
    reset-admin-password-on-startup: ${RESET_ADMIN_PASSWORD_ON_STARTUP:true}
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-jwt-secret-at-least-32-bytes}
    ttl-minutes: ${JWT_TTL_MINUTES:120}
  password-reset:
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
    token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
  password-verification:
    code-length: ${PASSWORD_VERIFICATION_CODE_LENGTH:6}
    ttl-minutes: ${PASSWORD_VERIFICATION_TTL_MINUTES:10}
    send-cooldown-seconds: ${PASSWORD_VERIFICATION_SEND_COOLDOWN_SECONDS:60}
    max-verify-failures: ${PASSWORD_VERIFICATION_MAX_VERIFY_FAILURES:5}
    verify-failure-window-minutes: ${PASSWORD_VERIFICATION_VERIFY_FAILURE_WINDOW_MINUTES:15}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:storage}
  file-upload:
    max-size-bytes: ${UPLOAD_MAX_REQUEST_SIZE_BYTES:5505025024}
  exception-log:
    retention-days: ${EXCEPTION_LOG_RETENTION_DAYS:30}
    max-stack-trace-length: ${EXCEPTION_LOG_MAX_STACK_TRACE_LENGTH:8000}
    max-summary-length: ${EXCEPTION_LOG_MAX_SUMMARY_LENGTH:500}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId}] - %msg%n"
  level:
    com.storage: debug
