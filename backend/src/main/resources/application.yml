spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: storage-backend
  sql:
    init:
      mode: always
      continue-on-error: true
      encoding: UTF-8
      schema-locations: classpath:db/migration-auth.sql,classpath:db/migration-phase3-system.sql,classpath:db/migration-phase4-system-ui.sql,classpath:db/migration-fix-chinese-data.sql,classpath:db/migration-phase6-platform-shell.sql,classpath:db/migration-phase7-ui-shell-paths.sql
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DB:storage}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:storage}
    password: ${MYSQL_PASSWORD:storage123}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        same-site: lax

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

storage:
  auth:
    default-password-suffix: "@123"
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:storage}

logging:
  level:
    com.storage: debug
